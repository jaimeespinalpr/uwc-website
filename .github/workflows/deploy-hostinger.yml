name: Deploy to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - "*.css"
      - "*.php"
      - "assets/**"
      - "data/**"
      - ".github/workflows/deploy-hostinger.yml"
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deploy bundle
        run: |
          mkdir -p dist
          rsync -av \
            --exclude 'dist/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude '*.zip' \
            --exclude 'README.md' \
            --exclude '.DS_Store' \
            ./ dist/

      - name: Generate Stripe runtime config (optional)
        env:
          STRIPE_MODE: ${{ secrets.STRIPE_MODE }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [ -n "${STRIPE_SECRET_KEY:-}" ]; then
            {
              echo "<?php"
              echo "declare(strict_types=1);"
              echo "define('STRIPE_MODE', '${STRIPE_MODE:-test}');"
              echo "define('STRIPE_PUBLISHABLE_KEY', '${STRIPE_PUBLISHABLE_KEY:-}');"
              echo "define('STRIPE_SECRET_KEY', '${STRIPE_SECRET_KEY}');"
              echo "define('STRIPE_WEBHOOK_SECRET', '${STRIPE_WEBHOOK_SECRET:-}');"
              echo "define('STRIPE_CURRENCY', 'usd');"
              echo "define('STRIPE_ENABLE_AUTOMATIC_TAX', true);"
            } > dist/stripe-config.php
            echo "Generated dist/stripe-config.php from GitHub Actions secrets."
          else
            echo "Stripe secrets not configured. Skipping stripe-config.php generation."
          fi

      - name: Generate SMTP runtime config (optional)
        env:
          MAIL_SMTP_ENABLED: ${{ secrets.MAIL_SMTP_ENABLED }}
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_ENCRYPTION: ${{ secrets.MAIL_SMTP_ENCRYPTION }}
          MAIL_SMTP_USERNAME: ${{ secrets.MAIL_SMTP_USERNAME }}
          MAIL_SMTP_PASSWORD: ${{ secrets.MAIL_SMTP_PASSWORD }}
          MAIL_SMTP_TIMEOUT: ${{ secrets.MAIL_SMTP_TIMEOUT }}
        run: |
          set -euo pipefail

          if [ -n "${MAIL_SMTP_PASSWORD:-}" ] && [ -n "${MAIL_SMTP_USERNAME:-}" ] && [ -n "${MAIL_SMTP_HOST:-}" ]; then
            {
              echo "<?php"
              echo "declare(strict_types=1);"
              echo "define('UWC_SMTP_ENABLED', ${MAIL_SMTP_ENABLED:-true});"
              echo "define('UWC_SMTP_HOST', '${MAIL_SMTP_HOST}');"
              echo "define('UWC_SMTP_PORT', ${MAIL_SMTP_PORT:-587});"
              echo "define('UWC_SMTP_ENCRYPTION', '${MAIL_SMTP_ENCRYPTION:-tls}');"
              echo "define('UWC_SMTP_USERNAME', '${MAIL_SMTP_USERNAME}');"
              echo "define('UWC_SMTP_PASSWORD', '${MAIL_SMTP_PASSWORD}');"
              echo "define('UWC_SMTP_TIMEOUT', ${MAIL_SMTP_TIMEOUT:-20});"
            } > dist/mail-smtp-config.php
            echo "Generated dist/mail-smtp-config.php from GitHub Actions secrets."
          else
            echo "SMTP secrets not configured. Skipping mail-smtp-config.php generation."
          fi

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via SFTP / FTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_PROTOCOL }}
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${HOSTINGER_HOST:?Missing secret HOSTINGER_HOST}"
          : "${HOSTINGER_USERNAME:?Missing secret HOSTINGER_USERNAME}"
          : "${HOSTINGER_PASSWORD:?Missing secret HOSTINGER_PASSWORD}"

          PROTOCOL="${HOSTINGER_PROTOCOL:-sftp}"
          PORT="${HOSTINGER_PORT:-22}"
          REMOTE_DIR="${HOSTINGER_REMOTE_DIR:-public_html}"

          LFTP_SETTINGS="$(mktemp)"
          {
            echo "set cmd:fail-exit yes"
            echo "set net:max-retries 2"
            echo "set net:reconnect-interval-base 5"
            echo "set sftp:auto-confirm yes"
            echo "set ssl:verify-certificate no"

            if [ "$PROTOCOL" = "ftps" ]; then
              echo "set ftp:ssl-force yes"
              echo "set ftp:ssl-protect-data yes"
            fi
          } > "$LFTP_SETTINGS"

          echo "Deploying dist/ to ${PROTOCOL}://${HOSTINGER_HOST}:${PORT}/${REMOTE_DIR}"

          lftp -u "${HOSTINGER_USERNAME},${HOSTINGER_PASSWORD}" "${PROTOCOL}://${HOSTINGER_HOST}:${PORT}" <<EOF
          source $LFTP_SETTINGS
          mirror -R --verbose=2 --parallel=1 --only-newer dist/ $REMOTE_DIR
          bye
          EOF

          rm -f "$LFTP_SETTINGS"
